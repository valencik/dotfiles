# Fix the copying issue via reattach-to-user-namespace
set -g default-shell $SHELL 

# Attempting to fix screen lag
# set -g default-terminal "screen-256color"

# Turn off window renaming
set-option -g allow-rename off

# Change prefix to C-a
set-option -g prefix C-a
bind-key C-a send-prefix

# Start numbering at 1
set -g base-index 1

# Allows for faster key repetition
set -s escape-time 0

# hjkl pane traversal
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# New pane uses current directory
bind '"' split-window -v -c "#{pane_current_path}"

# turn mouse on (works well on iPad)
set -g mouse on

# Enable vi copy mode
set-window-option mode-keys vi

# Enable vi style 'zt', 'zz', 'zb' scrolling in copy mode
# Create a new custom key table 'multi-z'
bind -N 'Scroll the line to top/middle/bottom using zt/zz/zb' -T copy-mode-vi 'z' switch-client -T multi-z
bind -T multi-z 't' send -X scroll-top
bind -T multi-z 'z' send -X scroll-middle
bind -T multi-z 'b' send -X scroll-bottom
